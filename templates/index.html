<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>KJEICampusCore</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<p class="text-center text-muted mb-4">
Smart Hostel & Student Management System
</p>
<body class="bg-dark">
    <!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">

    <div class="container">

        <a class="navbar-brand" href="/">
            KJEICampusCore
        </a>

        <div>

            <a href="/" class="btn btn-light me-2">
                Home
            </a>

            <a href="/view" class="btn btn-warning me-2">
                Students
            </a>

            <a href="/fees" class="btn btn-success me-2">
                Fees
            </a>

            <a href="/login" class="btn btn-info me-2">
                Login
            </a>

            <a href="/complaint" class="btn btn-danger">
                Complaints
            </a>
            <a href="/dashboard"
   class="btn btn-secondary me-2">
   Dashboard
</a>

<a href="/rooms"
   class="btn btn-dark me-2">
   Rooms
</a>

<a href="/attendance"
   class="btn btn-primary me-2">
   Attendance
</a>

<a href="/notice"
   class="btn btn-warning me-2">
   Notices
</a>

<a href="/admin"
   class="btn btn-danger me-2">
   Admin
</a>
<a href="/pdf" class="btn btn-light">
    PDF Report
</a>

        </div>

    </div>

</nav>



<!-- Main Content -->

<div class="container mt-5">

    <div class="row">

        <div class="col-md-6">

            <div class="card shadow-lg rounded-4">

                <div class="card-body p-5">

                    <h2 class="text-center text-primary mb-4">
                        Welcome to KJEICampusCore
                    </h2>

                    <form action="/register" method="POST">

                        <div class="mb-3">
                            <input type="text"
                                   class="form-control"
                                   name="name"
                                   placeholder="Enter Name"
                                   required>
                        </div>

                        <div class="mb-3">
                            <input type="email"
                                   class="form-control"
                                   name="email"
                                   placeholder="Enter Email"
                                   required>
                        </div>

                        <div class="mb-3">
                            <input type="text"
                                   class="form-control"
                                   name="phone"
                                   placeholder="Enter Phone"
                                   required>
                        </div>

                        <div class="mb-3">
                            <input type="text"
                                   class="form-control"
                                   name="room"
                                   placeholder="Enter Room Number"
                                   required>
                        </div>

                        <div class="mb-4">
                            <input type="password"
                                   class="form-control"
                                   name="password"
                                   placeholder="Enter Password"
                                   required>
                        </div>

                        <button type="submit"
                                class="btn btn-primary w-100">
                            Register Student
                        </button>

                    </form>

                </div>

            </div>

        </div>

        <!-- Dashboard -->

        <div class="col-md-6">

            <div class="row">

                <div class="col-md-6 mb-4">

                    <div class="card bg-success text-white shadow rounded-4">

                        <div class="card-body">

                            <h3>Total Students</h3>

                            <h1>{{ total_students }}</h1>

                        </div>

                    </div>

                </div>

                <div class="col-md-6 mb-4">

                    <div class="card bg-warning text-dark shadow rounded-4">

                        <div class="card-body">

                            <h3>Total Complaints</h3>

                            <h1>{{ total_complaints }}</h1>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
