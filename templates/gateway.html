<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - KJEICampusCore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .gateway-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .portal-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            padding: 16px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            text-decoration: none;
            margin-bottom: 16px;
            transition: all 0.2s ease-in-out;
        }
        .portal-btn:hover {
            background: #2563eb;
            border-color: #2563eb;
            transform: translateY(-2px);
            color: #fff;
        }
        .portal-btn i { font-size: 1.5rem; margin-right: 16px; }
    </style>
</head>
<body>
    <div class="gateway-card text-center text-white">
        <i class="fa-solid fa-shield-halved text-primary display-4 mb-3"></i>
        <h2 class="fw-bold mb-1">CampusCore Portal</h2>
        <p class="text-muted small mb-4">Select your operational authentication gateway node.</p>
        
        <a href="/admin" class="portal-btn">
            <i class="fa-solid fa-user-gear text-warning"></i>
            <div class="text-start">
                <div class="fw-bold">Administrative Engine</div>
                <div class="text-muted small" style="font-size: 0.75rem;">Manage inventory, users & finance</div>
            </div>
        </a>

        <a href="/login" class="portal-btn">
            <i class="fa-solid fa-user-graduate text-info"></i>
            <div class="text-start">
                <div class="fw-bold">Student Terminal</div>
                <div class="text-muted small" style="font-size: 0.75rem;">Check attendance, logs & bills</div>
            </div>
        </a>
        <div class="text-muted small mt-4 font-monospace" style="font-size: 0.7rem;">v2026.1.0 Cloud Core Running</div>
    </div>
</body>
</html>
