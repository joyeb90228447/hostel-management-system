<!DOCTYPE html>
<html>
<head>

<title>Rooms</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body class="bg-dark text-light">

<div class="container mt-5">

<h1 class="mb-4">
Room Availability
</h1>

<form action="/add_room"
      method="POST">

<div class="row mb-4">

<div class="col">
<input type="text"
       name="room_no"
       class="form-control"
       placeholder="Room No">
</div>

<div class="col">
<input type="number"
       name="capacity"
       class="form-control"
       placeholder="Capacity">
</div>

<div class="col">
<input type="number"
       name="occupied"
       class="form-control"
       placeholder="Occupied">
</div>

<div class="col">
<button class="btn btn-success w-100">
Add Room
</button>
</div>

</div>

</form>

<table class="table table-dark table-bordered">

<tr>
<th>ID</th>
<th>Room</th>
<th>Capacity</th>
<th>Occupied</th>
<th>Status</th>
</tr>

{% for room in rooms %}

<tr>

<td>{{ room[0] }}</td>
<td>{{ room[1] }}</td>
<td>{{ room[2] }}</td>
<td>{{ room[3] }}</td>
<td>{{ room[4] }}</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
