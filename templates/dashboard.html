<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>KJEICampusCore Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body class="bg-dark text-white">

<div class="d-flex">

    <!-- Sidebar -->

    <div class="bg-black p-4"
         style="width:250px;
                min-height:100vh;">

        <h2 class="text-warning mb-5">
            KJEICampusCore
        </h2>

        <a href="/dashboard"
           class="btn btn-dark w-100 mb-3 text-start">

           <i class="fa fa-chart-line"></i>
           Dashboard

        </a>

        <a href="/view"
           class="btn btn-dark w-100 mb-3 text-start">

           <i class="fa fa-users"></i>
           Students

        </a>

        <a href="/fees"
           class="btn btn-dark w-100 mb-3 text-start">

           <i class="fa fa-money-bill"></i>
           Fees

        </a>

        <a href="/rooms"
           class="btn btn-dark w-100 mb-3 text-start">

           <i class="fa fa-bed"></i>
           Rooms

        </a>

        <a href="/attendance"
           class="btn btn-dark w-100 mb-3 text-start">

           <i class="fa fa-calendar"></i>
           Attendance

        </a>

        <a href="/notice"
           class="btn btn-dark w-100 mb-3 text-start">

           <i class="fa fa-bell"></i>
           Notices

        </a>

        <a href="/pdf"
           class="btn btn-danger w-100 mb-3 text-start">

           <i class="fa fa-file-pdf"></i>
           PDF Report

        </a>

    </div>

    <!-- Main Content -->

    <div class="container-fluid p-5">

        <h1 class="mb-5">
            Welcome Admin 👋
        </h1>

        <!-- Cards -->

        <div class="row">

            <div class="col-md-4">

                <div class="card bg-primary text-white p-4 shadow-lg rounded-4">

                    <h3>Total Students</h3>

                    <h1>{{ total_students }}</h1>

                </div>

            </div>

            <div class="col-md-4">

                <div class="card bg-warning text-dark p-4 shadow-lg rounded-4">

                    <h3>Total Complaints</h3>

                    <h1>{{ total_complaints }}</h1>

                </div>

            </div>

            <div class="col-md-4">

                <div class="card bg-success text-white p-4 shadow-lg rounded-4">

                    <h3>Available Rooms</h3>

                    <h1>{{ available_rooms }}</h1>

                </div>

            </div>

        </div>

        <!-- Charts -->

        <div class="row mt-5">

            <div class="col-md-6">

                <div class="card p-4 rounded-4">

                    <canvas id="studentChart"></canvas>

                </div>

            </div>

            <div class="col-md-6">

                <div class="card p-4 rounded-4">

                    <canvas id="complaintChart"></canvas>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

new Chart(
    document.getElementById('studentChart'),
    {
        type: 'bar',

        data: {

            labels: ['Students'],

            datasets: [{

                label: 'Total Students',

                data: [{{ total_students }}]

            }]
        }
    }
)

new Chart(
    document.getElementById('complaintChart'),
    {
        type: 'pie',

        data: {

            labels: ['Complaints', 'Students'],

            datasets: [{

                data: [
                    {{ total_complaints }},
                    {{ total_students }}
                ]

            }]
        }
    }
)

</script>

</body>
</html>
