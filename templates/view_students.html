<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>View Students</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-dark text-light">
    <!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">

    <div class="container">

        <a class="navbar-brand" href="/">
            Hostel Management
        </a>

        <div>

            <a href="/" class="btn btn-light me-2">
                Home
            </a>

            <a href="/view" class="btn btn-warning me-2">
                Students
            </a>

            <a href="/fees" class="btn btn-success me-2">
                Fees
            </a>

            <a href="/login" class="btn btn-info me-2">
                Login
            </a>

            <a href="/complaint" class="btn btn-danger">
                Complaints
            </a>
            <a href="/dashboard"
   class="btn btn-secondary me-2">
   Dashboard
</a>

<a href="/rooms"
   class="btn btn-dark me-2">
   Rooms
</a>

<a href="/attendance"
   class="btn btn-primary me-2">
   Attendance
</a>

<a href="/notice"
   class="btn btn-warning me-2">
   Notices
</a>

<a href="/admin"
   class="btn btn-danger me-2">
   Admin
</a>

        </div>

    </div>

</nav>

<div class="container mt-5">

    <h1 class="text-center mb-4 text-warning">
        Registered Students
    </h1>
<form action="/search"
      method="POST"
      class="mb-4">

    <div class="row">

        <div class="col-md-10">

            <input type="text"
                   class="form-control"
                   name="keyword"
                   placeholder="Search Student By Name">

        </div>

        <div class="col-md-2">

            <button type="submit"
                    class="btn btn-primary w-100">

                Search

            </button>

        </div>

    </div>

</form>
    <table class="table table-bordered table-dark table-hover">

        <thead class="table-warning text-dark">

            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Room No</th>
                <th>Actions</th>
            </tr>

        </thead>

        <tbody>

            {% for student in students %}

            <tr>

                <td>{{ student[0] }}</td>
                <td>{{ student[1] }}</td>
                <td>{{ student[2] }}</td>
                <td>{{ student[3] }}</td>
                <td>{{ student[4] }}</td>
                <td>

    <a href="/edit/{{ student[0] }}"
       class="btn btn-warning btn-sm">
       Edit
    </a>

    <a href="/delete/{{ student[0] }}"
       class="btn btn-danger btn-sm">
       Delete
    </a>

</td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
