<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Student - CampusCore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { background-color: #f8fafc; font-family: 'Segoe UI', sans-serif; }
        .sidebar { height: 100vh; width: 260px; position: fixed; top: 0; left: 0; background: #0f172a; padding: 24px 16px; }
        .sidebar-brand { color: #ffffff; font-size: 1.3rem; font-weight: 800; text-decoration: none; display: flex; align-items: center; padding-bottom: 24px; border-bottom: 1px solid #1e293b; margin-bottom: 24px; }
        .sidebar-menu a { display: flex; align-items: center; padding: 12px 16px; color: #94a3b8; text-decoration: none; font-weight: 500; border-radius: 8px; }
        .sidebar-menu a:hover, .sidebar-menu a.active { color: #fff; background: #1e293b; }
        .main-content { margin-left: 260px; padding: 40px; }
        .glass-card { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 32px; max-width: 600px; }
        @media (max-width: 992px) {
            .sidebar { width: 100%; height: auto; position: relative; padding: 16px; }
            .sidebar-brand { display: none; }
            .sidebar-menu { display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; }
            .main-content { margin-left: 0; padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <a href="/dashboard" class="sidebar-brand"><i class="fa-solid fa-shield-halved me-2 text-primary"></i>CampusCore</a>
        <div class="sidebar-menu">
            <a href="/dashboard"><i class="fa-solid fa-chart-line"></i>Dashboard</a>
            <a href="/view" class="active"><i class="fa-solid fa-users"></i>Students</a>
            <a href="/rooms"><i class="fa-solid fa-bed"></i>Rooms</a>
            <a href="/fees"><i class="fa-solid fa-wallet"></i>Fees</a>
            <a href="/attendance"><i class="fa-solid fa-calendar-check"></i>Attendance</a>
            <a href="/notice"><i class="fa-solid fa-flag"></i>Notice Board</a>
        </div>
    </div>

    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="h3 fw-bold text-dark mb-0">Register Student Profile</h1>
            <a href="/view" class="btn btn-outline-secondary rounded-3"><i class="fa-solid fa-arrow-left me-2"></i>Profiles List</a>
        </div>
        <div class="glass-card shadow-sm">
            <form action="/register" method="POST">
                <div class="mb-3"><label class="form-label text-muted small fw-semibold">Full Identity Name</label><input type="text" name="name" class="form-control rounded-3" required></div>
                <div class="mb-3"><label class="form-label text-muted small fw-semibold">Email Address Node</label><input type="email" name="email" class="form-control rounded-3" required></div>
                <div class="mb-3"><label class="form-label text-muted small fw-semibold">Contact Mobile String</label><input type="text" name="phone" class="form-control rounded-3" required></div>
                <div class="mb-3"><label class="form-label text-muted small fw-semibold">Assigned Room Block</label><input type="text" name="room" class="form-control rounded-3" placeholder="e.g. A-102" required></div>
                <div class="mb-4"><label class="form-label text-muted small fw-semibold">Secure Account Password</label><input type="password" name="password" class="form-control rounded-3" required></div>
                <button type="submit" class="btn btn-primary w-100 rounded-3 py-2 fw-medium">Commit Profile to Cluster</button>
            </form>
        </div>
    </div>
    
    <script>
        history.pushState(null, null, location.href);
        window.onpopstate = function () { history.go(1); window.location.href = '/view'; };
    </script>
</body>
</html>
