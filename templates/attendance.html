<!DOCTYPE html>
<html>
<head>

<title>Attendance</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body class="bg-dark text-light">

<div class="container mt-5">

<h1 class="mb-4">
Attendance
</h1>

<form action="/add_attendance"
      method="POST">

<div class="row mb-4">

<div class="col">
<input type="text"
       name="student_name"
       class="form-control"
       placeholder="Student Name">
</div>

<div class="col">
<input type="date"
       name="date"
       class="form-control">
</div>

<div class="col">

<select name="status"
        class="form-control">

<option>Present</option>
<option>Absent</option>

</select>

</div>

<div class="col">

<button class="btn btn-primary w-100">
Add
</button>

</div>

</div>

</form>

<table class="table table-dark table-bordered">

<tr>

<th>ID</th>
<th>Name</th>
<th>Date</th>
<th>Status</th>

</tr>

{% for a in attendance %}

<tr>

<td>{{ a[0] }}</td>
<td>{{ a[1] }}</td>
<td>{{ a[2] }}</td>
<td>{{ a[3] }}</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
