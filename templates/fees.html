<!DOCTYPE html>
<html>
<head>

    <title>Fee Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-dark text-light">
    <!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">

    <div class="container">

        <a class="navbar-brand" href="/">
            Hostel Management
        </a>

        <div>

            <a href="/" class="btn btn-light me-2">
                Home
            </a>

            <a href="/view" class="btn btn-warning me-2">
                Students
            </a>

            <a href="/fees" class="btn btn-success me-2">
                Fees
            </a>

            <a href="/login" class="btn btn-info me-2">
                Login
            </a>

            <a href="/complaint" class="btn btn-danger">
                Complaints
            </a>
            <a href="/dashboard"
   class="btn btn-secondary me-2">
   Dashboard
</a>

<a href="/rooms"
   class="btn btn-dark me-2">
   Rooms
</a>

<a href="/attendance"
   class="btn btn-primary me-2">
   Attendance
</a>

<a href="/notice"
   class="btn btn-warning me-2">
   Notices
</a>

<a href="/admin"
   class="btn btn-danger me-2">
   Admin
</a>

        </div>

    </div>

</nav>

<div class="container mt-5">

    <h1 class="text-center text-success mb-4">
        Fee Management
    </h1>

    <div class="card p-4 mb-4">

        <form action="/add_fee"
              method="POST">

            <div class="row">

                <div class="col-md-4">

                    <input type="text"
                           class="form-control"
                           name="student_name"
                           placeholder="Student Name"
                           required>

                </div>

                <div class="col-md-3">

                    <input type="text"
                           class="form-control"
                           name="amount"
                           placeholder="Amount"
                           required>

                </div>

                <div class="col-md-3">

                    <select class="form-control"
                            name="status">

                        <option>Paid</option>
                        <option>Pending</option>

                    </select>

                </div>

                <div class="col-md-2">

                    <button type="submit"
                            class="btn btn-success w-100">

                        Add

                    </button>

                </div>

            </div>

        </form>

    </div>

    <table class="table table-dark table-bordered">

        <thead>

            <tr>

                <th>ID</th>
                <th>Student Name</th>
                <th>Amount</th>
                <th>Status</th>

            </tr>

        </thead>

        <tbody>

            {% for fee in fees %}

            <tr>

                <td>{{ fee[0] }}</td>
                <td>{{ fee[1] }}</td>
                <td>{{ fee[2] }}</td>
                <td>{{ fee[3] }}</td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
