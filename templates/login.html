<!DOCTYPE html>
<html>
<head>

    <title>Student Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-dark">
    <!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">

    <div class="container">

        <a class="navbar-brand" href="/">
            Hostel Management
        </a>

        <div>

            <a href="/" class="btn btn-light me-2">
                Home
            </a>

            <a href="/view" class="btn btn-warning me-2">
                Students
            </a>

            <a href="/fees" class="btn btn-success me-2">
                Fees
            </a>

            <a href="/login" class="btn btn-info me-2">
                Login
            </a>

            <a href="/complaint" class="btn btn-danger">
                Complaints
            </a>
            <a href="/dashboard"
   class="btn btn-secondary me-2">
   Dashboard
</a>

<a href="/rooms"
   class="btn btn-dark me-2">
   Rooms
</a>

<a href="/attendance"
   class="btn btn-primary me-2">
   Attendance
</a>

<a href="/notice"
   class="btn btn-warning me-2">
   Notices
</a>

<a href="/admin"
   class="btn btn-danger me-2">
   Admin
</a>

        </div>

    </div>

</nav>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card shadow-lg rounded-4">

                <div class="card-body p-5">

                    <h1 class="text-center text-primary mb-4">
                        Student Login
                    </h1>

                    <form action="/student_login"
                          method="POST">

                        <div class="mb-3">

                            <input type="email"
                                   class="form-control"
                                   name="email"
                                   placeholder="Enter Email"
                                   required>

                        </div>

                        <div class="mb-4">

                            <input type="password"
                                   class="form-control"
                                   name="password"
                                   placeholder="Enter Password"
                                   required>

                        </div>

                        <button type="submit"
                                class="btn btn-primary w-100">

                            Login

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
