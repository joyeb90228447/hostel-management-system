<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login - CampusCore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .form-control {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 12px 16px;
            border-radius: 12px;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: #3b82f6;
            color: #fff;
            box-shadow: none;
        }
        .form-control::placeholder {
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="login-card text-white">
        <div class="text-center mb-4">
            <i class="fa-solid fa-user-graduate text-info display-5 mb-2"></i>
            <h3 class="fw-bold mb-1">Student Terminal</h3>
            <p class="text-muted small">Sign in to access your dashboard metrics</p>
        </div>

        <form action="/login" method="POST">
            <div class="mb-3">
                <label class="form-label text-muted small fw-semibold">Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="name@domain.com" required>
            </div>

            <div class="mb-4">
                <label class="form-label text-muted small fw-semibold">Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 rounded-3 py-2.5 fw-semibold">
                 Authenticate Account
            </button>
        </form>

        <div class="text-center mt-4">
            <a href="/" class="text-muted small text-decoration-none"><i class="fa-solid fa-arrow-left me-2"></i>Back to Portal Selection</a>
        </div>
    </div>

    <script>
        history.pushState(null, null, location.href);
        window.onpopstate = function () {
            history.go(1);
            window.location.href = '/'; // Redirects back to gateway instead of crashing out
        };
    </script>
</body>
</html>
